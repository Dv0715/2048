<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金門秘卷・神社之夜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;700;900&family=Ma+Shan+Zheng&display=swap');

:root {
  --gold:    #d4a043;
  --gold-l:  #f0c868;
  --gold-ll: #fce8a8;
  --gold-dim: rgba(212,160,67,0.7);
  --amber:   #e8843a;
  --cream:   #f8edd8;
  --warm-w:  rgba(252,232,168,0.92);
  --silver:  #c8d0d8;
  --ink:     #1a0e04;
  --panel:   rgba(12,6,2,0.62);
  --panel-b: rgba(20,10,4,0.75);
  --border:  rgba(212,160,67,0.45);
  --border-l:rgba(212,160,67,0.22);
  --glow:    rgba(212,160,67,0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 22px 14px 48px;
  overflow-x: hidden;
  position: relative;
  color: var(--cream);
}

/* ─── 背景圖 ─── */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  filter: brightness(0.72) saturate(1.15);
}

/* 背景暗角 vignette */
.bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, transparent 40%, rgba(8,4,2,0.55) 100%),
    linear-gradient(to bottom, rgba(8,4,2,0.1) 0%, rgba(8,4,2,0.45) 100%);
}

/* 飄浮燈籠光點 */
.lantern-glow {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  filter: blur(18px);
  animation: lantern-float ease-in-out infinite alternate;
}
.lg1 { width:80px;height:80px;  background:rgba(240,140,40,0.22); top:12%; left:8%;  animation-duration:6s; }
.lg2 { width:60px;height:60px;  background:rgba(255,160,60,0.18); top:18%; right:10%;animation-duration:7.5s;animation-delay:-3s; }
.lg3 { width:50px;height:50px;  background:rgba(220,120,30,0.16); top:8%;  left:30%; animation-duration:9s; animation-delay:-5s; }
.lg4 { width:40px;height:40px;  background:rgba(255,200,80,0.14); top:22%; right:28%;animation-duration:8s; animation-delay:-2s; }
@keyframes lantern-float {
  0%   { transform: translate(0,0) scale(1); opacity:0.8; }
  100% { transform: translate(4px,-8px) scale(1.15); opacity:1; }
}

/* 月光暈 */
.moon-glow {
  position: fixed;
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(255,240,200,0.12) 0%, rgba(255,220,160,0.06) 45%, transparent 70%);
  border-radius: 50%;
  top: 5%; left: 50%; transform: translateX(-50%);
  pointer-events: none;
  z-index: 1;
  animation: moon-pulse 8s ease-in-out infinite alternate;
}
@keyframes moon-pulse {
  0%   { opacity:0.7; transform: translateX(-50%) scale(1); }
  100% { opacity:1;   transform: translateX(-50%) scale(1.08); }
}

/* ─── Header ─── */
.header {
  position: relative; z-index: 3;
  width: 100%; max-width: 460px;
  text-align: center;
  margin-bottom: 16px;
}

.deco-line {
  display: flex; align-items: center; gap: 10px;
  justify-content: center; margin-bottom: 8px;
}
.deco-line::before,.deco-line::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.deco-line span { color:var(--gold); font-size:14px; text-shadow:0 0 8px var(--glow); }

h1 {
  font-family: 'Ma Shan Zheng', serif;
  font-size: clamp(24px,6.5vw,38px);
  color: var(--gold-ll);
  letter-spacing: 0.3em;
  text-shadow:
    0 0 20px rgba(212,160,67,0.9),
    0 0 50px rgba(212,160,67,0.4),
    0 2px 4px rgba(0,0,0,0.8);
  line-height: 1.2;
  margin-bottom: 3px;
}

.subtitle {
  font-size: 10px;
  color: var(--gold-dim);
  letter-spacing: 0.3em;
  margin-bottom: 14px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}

/* 分數 — 毛玻璃卡片 */
.scores-row { display:flex; gap:10px; justify-content:center; margin-bottom:12px; }

.score-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 7px 20px;
  min-width: 96px;
  text-align: center;
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,160,67,0.15), 0 0 16px rgba(212,160,67,0.06);
  position: relative;
}
.score-box::before { content:'⟨'; position:absolute;top:3px;left:5px;color:var(--gold);font-size:10px;opacity:0.6; }
.score-box::after  { content:'⟩'; position:absolute;top:3px;right:5px;color:var(--gold);font-size:10px;opacity:0.6; }

.score-label { font-size:9px; color:var(--gold); letter-spacing:0.2em; margin-bottom:1px; text-shadow:0 0 6px var(--glow); }
.score-value { font-family:'Noto Serif TC',serif; font-size:21px; font-weight:700; color:var(--gold-ll); text-shadow:0 0 10px var(--glow); }

/* 按鈕 */
.btn-row { display:flex; gap:10px; justify-content:center; }
.btn {
  font-family:'Noto Serif TC',serif; font-size:13px; font-weight:700;
  letter-spacing:0.12em; padding:8px 20px;
  border-radius:3px; cursor:pointer;
  backdrop-filter:blur(10px);
  transition: transform 0.15s, filter 0.15s;
  position:relative; overflow:hidden;
}
.btn-main {
  background: linear-gradient(135deg, rgba(212,160,67,0.3), rgba(212,160,67,0.15));
  border: 1px solid var(--border);
  color: var(--gold-ll);
  box-shadow: 0 0 14px rgba(212,160,67,0.15), inset 0 1px 0 rgba(212,160,67,0.2);
}
.btn-sub {
  background: rgba(12,6,2,0.5);
  border: 1px solid rgba(200,208,216,0.2);
  color: var(--silver);
}
.btn:hover  { transform:translateY(-1px); filter:brightness(1.25); }
.btn:active { transform:translateY(1px);  filter:brightness(0.9); }

/* 光澤掃過效果 */
.btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);
  transform:translateX(-100%); transition:transform 0.5s;
}
.btn:hover::before { transform:translateX(100%); }

/* ─── 棋盤 ─── */
.game-container { position:relative; z-index:3; width:100%; max-width:460px; }

/* 捲軸外框 — 暖金邊 */
.board-frame {
  position: relative;
  background: var(--panel-b);
  border-radius: 6px;
  padding: 5px;
  backdrop-filter: blur(20px);
  box-shadow:
    0 0 0 1px var(--border),
    0 0 0 3px rgba(8,4,2,0.7),
    0 0 0 4px rgba(212,160,67,0.18),
    0 20px 60px rgba(0,0,0,0.75),
    0 0 60px rgba(212,160,67,0.08),
    inset 0 1px 0 rgba(212,160,67,0.1);
}

/* 四角裝飾 */
.corner { position:absolute; width:16px; height:16px; border-color:var(--border); border-style:solid; z-index:4; }
.c-tl { top:7px;left:7px;   border-width:1px 0 0 1px; }
.c-tr { top:7px;right:7px;  border-width:1px 1px 0 0; }
.c-bl { bottom:7px;left:7px; border-width:0 0 1px 1px; }
.c-br { bottom:7px;right:7px;border-width:0 1px 1px 0; }

/* 角落菱形符 */
.board-frame::before {
  content:'◈'; position:absolute; top:10px; left:14px;
  color:var(--gold); font-size:14px; opacity:0.5;
  text-shadow:0 0 8px var(--glow); z-index:4;
}
.board-frame::after {
  content:'◈'; position:absolute; bottom:10px; right:14px;
  color:var(--gold); font-size:14px; opacity:0.5;
  text-shadow:0 0 8px var(--glow); z-index:4;
}

#board {
  display:grid; grid-template-columns:repeat(4,1fr);
  gap:7px; padding:10px;
  background: rgba(6,3,1,0.6);
  border-radius:3px; aspect-ratio:1/1; width:100%;
  position:relative;
  backdrop-filter:blur(4px);
}

/* 棋盤月光暈染 */
#board::before {
  content:''; position:absolute; inset:0; border-radius:3px;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,230,160,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(232,132,58,0.05) 0%, transparent 50%);
  pointer-events:none;
}

.cell-bg {
  background: rgba(255,210,140,0.06);
  border-radius:3px;
  border:1px solid rgba(212,160,67,0.1);
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
}

.tile-wrap { position:absolute; top:0;left:0; width:100%;height:100%; pointer-events:none; }

/* ─── 文化方塊 ─── */
.tile {
  position:absolute;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-radius:3px; overflow:hidden; user-select:none;
  backdrop-filter:blur(6px);
}

/* 方塊通用內紋 */
.tile::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='10' cy='10' r='4' fill='none' stroke='%23ffffff' stroke-width='0.3' opacity='0.07'/%3E%3C/svg%3E");
}

.tile-emoji { line-height:1; position:relative; z-index:1; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.7)); }
.tile-name  {
  font-family:'Ma Shan Zheng','Noto Serif TC',serif;
  text-align:center; line-height:1.15; letter-spacing:0.06em;
  position:relative; z-index:1;
  text-shadow:0 1px 4px rgba(0,0,0,0.9); padding:0 3px;
}

/* ── 方塊配色（暖色系融合燈籠夜晚氛圍） ── */
.t2    { background:rgba(30,18,6,0.78);  color:#a09070; border:1px solid rgba(160,144,112,0.2); box-shadow:0 3px 10px rgba(0,0,0,0.6); }
.t4    { background:rgba(40,22,6,0.80);  color:#c0a060; border:1px solid rgba(192,160,96,0.25); box-shadow:0 3px 10px rgba(0,0,0,0.6); }
.t8    { background:rgba(50,22,4,0.82);  color:#d88040; border:1px solid rgba(216,128,64,0.3);  box-shadow:0 3px 12px rgba(0,0,0,0.6),0 0 10px rgba(216,128,64,0.1); }
.t16   { background:rgba(60,20,4,0.84);  color:#e87040; border:1px solid rgba(232,112,64,0.35); box-shadow:0 3px 12px rgba(0,0,0,0.6),0 0 14px rgba(232,112,64,0.15); }
.t32   { background:rgba(80,16,4,0.85);  color:#f06040; border:1px solid rgba(240,96,64,0.38);  box-shadow:0 3px 14px rgba(0,0,0,0.65),0 0 16px rgba(220,80,40,0.2); }
.t64   { background:rgba(100,20,4,0.86); color:#f07848; border:1px solid rgba(240,120,72,0.4);  box-shadow:0 3px 14px rgba(0,0,0,0.65),0 0 18px rgba(220,80,40,0.25); }
.t128  {
  background:linear-gradient(160deg,rgba(60,36,4,0.88),rgba(80,48,6,0.9));
  color:#e8c060; border:1px solid rgba(212,160,67,0.4);
  box-shadow:0 3px 14px rgba(0,0,0,0.65),0 0 18px rgba(212,160,67,0.2),inset 0 1px 0 rgba(212,160,67,0.12);
}
.t256  {
  background:linear-gradient(160deg,rgba(70,42,4,0.9),rgba(92,56,6,0.92));
  color:#f0d070; border:1px solid rgba(232,180,80,0.48);
  box-shadow:0 3px 16px rgba(0,0,0,0.68),0 0 24px rgba(212,160,67,0.28),inset 0 1px 0 rgba(232,180,80,0.15);
}
.t512  {
  background:linear-gradient(160deg,rgba(20,10,40,0.88),rgba(30,14,52,0.9));
  color:#c8a8f8; border:1px solid rgba(180,140,240,0.42);
  box-shadow:0 3px 16px rgba(0,0,0,0.68),0 0 22px rgba(150,100,220,0.28),inset 0 1px 0 rgba(180,140,240,0.1);
}
.t1024 {
  background:linear-gradient(160deg,rgba(24,10,48,0.9),rgba(36,14,64,0.92));
  color:#d8b8ff; border:1px solid rgba(200,160,255,0.5);
  box-shadow:0 3px 16px rgba(0,0,0,0.68),0 0 30px rgba(160,100,240,0.36),inset 0 1px 0 rgba(200,160,255,0.14);
  animation:aura-pulse 2.5s ease-in-out infinite;
}
.t2048 {
  background:linear-gradient(160deg,rgba(60,36,2,0.92),rgba(80,52,4,0.94),rgba(60,36,2,0.92));
  color:#fce8a8; border:1px solid rgba(252,232,168,0.7);
  box-shadow:0 3px 16px rgba(0,0,0,0.68),0 0 40px rgba(212,160,67,0.6),inset 0 1px 0 rgba(252,232,168,0.2);
  animation:divine-glow 2s ease-in-out infinite;
}

@keyframes aura-pulse {
  0%,100% { box-shadow:0 3px 16px rgba(0,0,0,0.68),0 0 30px rgba(160,100,240,0.36); }
  50%      { box-shadow:0 3px 16px rgba(0,0,0,0.68),0 0 44px rgba(160,100,240,0.54); }
}
@keyframes divine-glow {
  0%,100% { box-shadow:0 3px 16px rgba(0,0,0,0.68),0 0 40px rgba(212,160,67,0.6); filter:brightness(1); }
  50%      { box-shadow:0 3px 16px rgba(0,0,0,0.68),0 0 60px rgba(212,160,67,0.8),0 0 90px rgba(212,160,67,0.3); filter:brightness(1.12); }
}

/* 高階方塊 idle 漂浮 */
@keyframes tile-float {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-3px); }
}
.t512  { animation: tile-float 3.5s ease-in-out infinite; }
.t1024 { animation: aura-pulse 2.5s ease-in-out infinite, tile-float 3s ease-in-out infinite; }
.t2048 { animation: divine-glow 2s ease-in-out infinite, tile-float 2.5s ease-in-out infinite; }

/* 分數卡得分閃光 */
@keyframes score-flash {
  0%   { box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 0px rgba(212,160,67,0); }
  30%  { box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 24px rgba(212,160,67,0.7),inset 0 0 12px rgba(212,160,67,0.15); }
  100% { box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 0px rgba(212,160,67,0); }
}
.score-box.flash { animation: score-flash 0.5s ease-out; }

/* ─── 倒數計時條 ─── */
.steps-bar-wrap {
  position: relative;
  z-index: 3;
  width: 100%;
}

.steps-bar-inner {
  background: var(--panel-b);
  border: 1px solid var(--border-l);
  border-radius: 4px;
  padding: 8px 14px 10px;
  backdrop-filter: blur(16px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.45), inset 0 1px 0 rgba(212,160,67,0.08);
}

.steps-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}

.steps-label {
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 0.22em;
  text-shadow: 0 0 6px var(--glow);
}

.steps-count {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--gold-ll);
  text-shadow: 0 0 8px var(--glow);
  letter-spacing: 0.06em;
  font-variant-numeric: tabular-nums;
}

.steps-track {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.07);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.steps-fill {
  height: 100%;
  border-radius: 4px;
  /* 計時器不用 transition，直接更新寬度讓它看起來平滑流動 */
  background: linear-gradient(90deg, var(--gold), var(--gold-l));
  position: relative;
}

/* 頂部光澤 */
.steps-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 45%;
  background: rgba(255,255,255,0.13);
  border-radius: 4px 4px 0 0;
}

.steps-fill.warn  { background: linear-gradient(90deg, #d08020, #f0b040); }
.steps-fill.low   { background: linear-gradient(90deg, #c84020, #e86030); }
.steps-fill.empty { background: rgba(140,30,10,0.5); }

/* 補時閃光：合併成功時讓條框快閃金色 */
@keyframes time-bonus {
  0%   { box-shadow: 0 4px 20px rgba(0,0,0,0.45); }
  25%  { box-shadow: 0 4px 20px rgba(0,0,0,0.45), 0 0 22px rgba(212,160,67,0.75), inset 0 0 10px rgba(212,160,67,0.15); }
  100% { box-shadow: 0 4px 20px rgba(0,0,0,0.45); }
}
.steps-bar-inner.bonus { animation: time-bonus 0.45s ease-out; }

/* 危險脈動 */
@keyframes steps-danger {
  0%,100% { box-shadow: 0 4px 20px rgba(0,0,0,0.45); }
  50%      { box-shadow: 0 4px 20px rgba(0,0,0,0.45), 0 0 20px rgba(220,60,30,0.55); }
}
.steps-bar-inner.danger { animation: steps-danger 0.65s ease-in-out infinite; }

/* 里程碑橫幅 */
#milestone {
  position: fixed;
  top: 50%;  left: 50%;
  transform: translate(-50%,-50%) scale(0.7);
  z-index: 200;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: none;
}
#milestone.show {
  animation: milestone-in 2.2s ease-out forwards;
}
@keyframes milestone-in {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(0.5); filter:brightness(3); }
  15%  { opacity:1; transform:translate(-50%,-50%) scale(1.08); filter:brightness(1.5); }
  30%  { transform:translate(-50%,-50%) scale(1); filter:brightness(1); }
  70%  { opacity:1; transform:translate(-50%,-50%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-56%) scale(0.95); }
}
.milestone-kanji {
  font-family:'Ma Shan Zheng',serif;
  font-size: 80px;
  color: var(--gold-ll);
  text-shadow: 0 0 40px rgba(212,160,67,1), 0 0 80px rgba(212,160,67,0.6), 0 0 120px rgba(212,160,67,0.3);
  line-height: 1;
  display: block;
}
.milestone-name {
  font-family:'Ma Shan Zheng',serif;
  font-size: 22px;
  color: var(--cream);
  letter-spacing: 0.3em;
  text-shadow: 0 0 16px rgba(212,160,67,0.8), 0 2px 6px rgba(0,0,0,0.9);
  margin-top: 6px;
  display: block;
}
.milestone-sub {
  font-size: 11px;
  color: var(--gold-dim);
  letter-spacing: 0.2em;
  margin-top: 4px;
  display: block;
}

/* ─── 動畫 ─── */
@keyframes pop-in {
  0%   { transform:scale(0.4); opacity:0; filter:brightness(2.5); }
  55%  { transform:scale(1.12); filter:brightness(1.3); }
  100% { transform:scale(1); opacity:1; filter:brightness(1); }
}
@keyframes merge-pop {
  0%   { transform:scale(1); filter:brightness(1); }
  22%  { transform:scale(1.3); filter:brightness(2) saturate(1.5); }
  56%  { transform:scale(0.91); filter:brightness(1.1); }
  100% { transform:scale(1); filter:brightness(1); }
}
.tile.merged { animation:merge-pop 0.32s cubic-bezier(.36,.07,.19,.97); }

/* ─── 合併特效 ─── */
.rune-particle {
  position:absolute; pointer-events:none; z-index:25;
  transform:translate(-50%,-50%);
  font-family:'Ma Shan Zheng','Noto Serif TC',serif; font-weight:700;
  animation:rune-fly 0.75s ease-out forwards; line-height:1;
}
@keyframes rune-fly {
  0%   { opacity:1; transform:translate(-50%,-50%) scale(1.3) rotate(0deg); }
  100% { opacity:0; transform:translate(var(--tx),var(--ty)) scale(0.3) rotate(var(--rot)); }
}

.foil-particle {
  position:absolute; pointer-events:none; z-index:24;
  transform:translate(-50%,-50%); border-radius:1px;
  animation:foil-fly 0.65s ease-out forwards;
}
@keyframes foil-fly {
  0%   { opacity:0.9; transform:translate(-50%,-50%) scale(1) rotate(0deg); }
  100% { opacity:0;   transform:translate(var(--tx),var(--ty)) scale(0.15) rotate(var(--rot)); }
}

.ink-burst {
  position:absolute; border-radius:50%; pointer-events:none; z-index:18;
  transform:translate(-50%,-50%); animation:ink-expand 0.6s ease-out forwards;
}
@keyframes ink-expand {
  0%   { width:0; height:0; opacity:0.75; }
  60%  { opacity:0.3; }
  100% { width:140px; height:140px; opacity:0; }
}

.merge-ring {
  position:absolute; border-radius:50%; pointer-events:none; z-index:22;
  transform:translate(-50%,-50%); border-style:solid;
  animation:ring-expand 0.5s ease-out forwards;
}

<script>
// ═══════════════════════════════════════
//  🔊 Web Audio 音效引擎（純合成，無需外部檔）
// ═══════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playSlide() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(320, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.06, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
    o.start(); o.stop(ctx.currentTime + 0.1);
  } catch(e) {}
}

function playMerge(val) {
  try {
    const ctx = getAudioCtx();
    // 音高隨等級升高
    const freqMap = {2:280,4:320,8:380,16:440,32:500,64:560,128:640,256:720,512:820,1024:960,2048:1100};
    const baseFreq = freqMap[val] || 500;

    // 主音
    const o1 = ctx.createOscillator();
    const g1 = ctx.createGain();
    o1.connect(g1); g1.connect(ctx.destination);
    o1.type = 'triangle';
    o1.frequency.setValueAtTime(baseFreq * 0.5, ctx.currentTime);
    o1.frequency.exponentialRampToValueAtTime(baseFreq, ctx.currentTime + 0.06);
    g1.gain.setValueAtTime(0.0, ctx.currentTime);
    g1.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.02);
    g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
    o1.start(); o1.stop(ctx.currentTime + 0.3);

    // 泛音（五度）
    const o2 = ctx.createOscillator();
    const g2 = ctx.createGain();
    o2.connect(g2); g2.connect(ctx.destination);
    o2.type = 'sine';
    o2.frequency.value = baseFreq * 1.5;
    g2.gain.setValueAtTime(0.05, ctx.currentTime + 0.03);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o2.start(ctx.currentTime + 0.03); o2.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function playMilestone() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047]; // C E G C
    notes.forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle';
      o.frequency.value = freq;
      const t = ctx.currentTime + i * 0.12;
      g.gain.setValueAtTime(0.0, t);
      g.gain.linearRampToValueAtTime(0.1, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      o.start(t); o.stop(t + 0.4);
    });
  } catch(e) {}
}

// ═══════════════════════════════════════
//  📊 分數動畫
// ═══════════════════════════════════════
function animateScore(el, from, to) {
  const duration = 300;
  const start = performance.now();
  const box = el.closest('.score-box');

  // 閃光
  box.classList.remove('flash');
  void box.offsetWidth;
  box.classList.add('flash');
  box.addEventListener('animationend', () => box.classList.remove('flash'), {once:true});

  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // ease-out-cubic
    el.textContent = Math.round(from + (to - from) * ease);
    if (t < 1) requestAnimationFrame(tick);
    else el.textContent = to;
  }
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════
//  🎖 里程碑系統
// ═══════════════════════════════════════
let highestTileSeen = 0;

const MILESTONES = {
  128:  { kanji:'景', name:'落日海景',   sub:'晚霞映海・金門之美' },
  256:  { kanji:'鳥', name:'戴勝鳥現',   sub:'冠羽搖曳・閩南靈鳥' },
  512:  { kanji:'坑', name:'翟山坑道',   sub:'地底長廊・戰地傳奇' },
  1024: { kanji:'獅', name:'風獅爺降',   sub:'鎮風辟邪・金門守護' },
  2048: { kanji:'山', name:'太武山臨',   sub:'金門永固・山河壯麗' },
};

function checkMilestone(newMax) {
  if (newMax <= highestTileSeen) return;
  highestTileSeen = newMax;
  const m = MILESTONES[newMax];
  if (!m) return;

  // 顯示橫幅
  const ms = document.getElementById('milestone');
  document.getElementById('msKanji').textContent = m.kanji;
  document.getElementById('msName').textContent  = m.name;
  document.getElementById('msSub').textContent   = m.sub;
  ms.classList.remove('show');
  void ms.offsetWidth;
  ms.classList.add('show');
  ms.addEventListener('animationend', () => ms.classList.remove('show'), {once:true});

  playMilestone();
}

// 保存上一次分數用於動畫
let displayedScore = 0;
let displayedBest  = 0;

// ═══════════════════════════════════════
//  ⏱ 倒數計時系統
// ═══════════════════════════════════════
const TIMER_INIT = 30;      // 初始秒數
const TIMER_MAX  = 30;      // 補時上限（合併只能回血不能超量）
// 合併補時: Math.floor(Math.log2(mergedVal)) 秒
// 合成  4 → +2s，合成  8 → +3s，合成 16 → +4s
// 合成 32 → +5s，合成 64 → +6s，合成128 → +7s，合成2048 → +11s

let timeLeft    = TIMER_INIT;   // 目前剩餘秒數（可含小數）
let timerHandle = null;         // setInterval handle
let timerRunning = false;

function updateTimerUI() {
  const ratio  = Math.max(0, timeLeft / TIMER_INIT);
  const fill   = document.getElementById('stepsFill');
  const count  = document.getElementById('stepsCount');
  const inner  = document.getElementById('stepsBarInner');

  // 進度條寬度：以 TIMER_INIT 為基準，補時後可能超過100%但上限夾住顯示
  const displayRatio = Math.min(1, Math.max(0, timeLeft / TIMER_INIT));
  fill.style.width = (displayRatio * 100).toFixed(2) + '%';

  // 顯示秒數（整數）
  const secs = Math.max(0, Math.ceil(timeLeft));
  count.textContent = secs + ' 秒';

  // 顏色等級
  fill.classList.remove('low', 'warn', 'empty');
  if      (timeLeft <= 0)   fill.classList.add('empty');
  else if (ratio <= 0.2)    fill.classList.add('low');
  else if (ratio <= 0.4)    fill.classList.add('warn');

  // 危險/補時動畫互斥
  if (ratio <= 0.25 && timeLeft > 0) {
    if (!inner.classList.contains('bonus')) inner.classList.add('danger');
  } else {
    inner.classList.remove('danger');
  }
}

function timerTick() {
  timeLeft -= 0.1;
  updateTimerUI();
  if (timeLeft <= 0) {
    timeLeft = 0;
    updateTimerUI();
    stopTimer();
    // 遊戲結束判斷
    if (!won) showOverlay('時','時間耗盡','結界消散・請再試一次');
  }
}

function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  timerHandle = setInterval(timerTick, 100);  // 每 100ms tick 一次
}

function stopTimer() {
  timerRunning = false;
  if (timerHandle) { clearInterval(timerHandle); timerHandle = null; }
}

function addTime(seconds) {
  timeLeft = Math.min(TIMER_MAX, timeLeft + seconds);
  updateTimerUI();
  // 閃金色補時效果
  const inner = document.getElementById('stepsBarInner');
  inner.classList.remove('bonus', 'danger');
  void inner.offsetWidth;
  inner.classList.add('bonus');
  inner.addEventListener('animationend', () => {
    inner.classList.remove('bonus');
    // 恢復危險判斷
    updateTimerUI();
  }, {once: true});
}

function resetTimer() {
  stopTimer();
  timeLeft = TIMER_INIT;
  updateTimerUI();
}

// staminaMerge 改名為 timerMerge 供 move() 呼叫
function staminaMerge(mergedVal) {
  const bonus = Math.floor(Math.log2(mergedVal));
  addTime(bonus);
}

// resetStamina 供 newGame() 呼叫
function resetStamina() {
  resetTimer();
}

const TILES = [
  { val:2,    cls:'t2',    emoji:'🌊', name:'海風',     swatchBg:'rgba(30,18,6,0.9)' },
  { val:4,    cls:'t4',    emoji:'🌾', name:'高粱',     swatchBg:'rgba(40,22,6,0.9)' },
  { val:8,    cls:'t8',    emoji:'🦀', name:'招潮蟹',   swatchBg:'rgba(50,22,4,0.9)' },
  { val:16,   cls:'t16',   emoji:'🍶', name:'金門酒',   swatchBg:'rgba(60,20,4,0.9)' },
  { val:32,   cls:'t32',   emoji:'\u2694', name:'鋼刀', swatchBg:'rgba(80,16,4,0.9)' },
  { val:64,   cls:'t64',   emoji:'🏠', name:'閩式民居', swatchBg:'rgba(100,20,4,0.9)' },
  { val:128,  cls:'t128',  emoji:'🌅', name:'落日海景', swatchBg:'rgba(60,36,4,0.9)' },
  { val:256,  cls:'t256',  emoji:'🐦', name:'戴勝鳥',   swatchBg:'rgba(70,42,4,0.9)' },
  { val:512,  cls:'t512',  emoji:'🏯', name:'翟山坑道', swatchBg:'rgba(20,10,40,0.9)' },
  { val:1024, cls:'t1024', emoji:'🎆', name:'風獅爺',   swatchBg:'rgba(24,10,48,0.9)' },
  { val:2048, cls:'t2048', emoji:'\u26E9', name:'太武山', swatchBg:'rgba(60,36,2,0.9)' },
];
const tileMap={};
TILES.forEach(t=>tileMap[t.val]=t);
document.getElementById('legendGrid').innerHTML = TILES.map(t=>`
  <div class="legend-item">
    <div class="legend-swatch" style="background:${t.swatchBg}">${t.emoji}</div>
    <span>${t.name}（${t.val}）</span>
  </div>`).join('');

function particleColor(v){
  return {2:'#a09070',4:'#c0a060',8:'#d88040',16:'#e87040',32:'#f06040',64:'#f07848',
          128:'#e8c060',256:'#f0d070',512:'#c8a8f8',1024:'#d8b8ff',2048:'#fce8a8'}[v]||'#d4a043';
}
const RUNES=['金','門','閩','粱','潮','風','獅','坑','道','武','嶼','海'];

const SIZE=4, SLIDE_MS=125;
let score=0,best=0,won=false,prevCells,prevScore,nextId=1;
let cells=emptyBoard(),tileEls={},isAnimating=false;

function emptyBoard(){ return Array.from({length:SIZE},()=>Array(SIZE).fill(null)); }
function newGame(){
  cells=emptyBoard();score=0;prevCells=null;prevScore=0;won=false;nextId=1;tileEls={};
  highestTileSeen=0; displayedScore=0; displayedBest=0;
  document.getElementById('score').textContent='0';
  document.getElementById('best').textContent='0';
  resetStamina();
  document.getElementById('overlay').classList.remove('active');
  // 重設暫停
  isPaused = false;
  document.getElementById('pauseOverlay').classList.remove('active');
  const btn = document.getElementById('btnPause');
  if(btn){ btn.textContent='暫　　停'; btn.dataset.paused='false'; }
  addRandom();addRandom();renderFull();
}
function cellVal(r,c){ return cells[r][c]?.val||0; }
function addRandom(){
  const e=[];
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!cells[r][c])e.push([r,c]);
  if(!e.length)return null;
  const[r,c]=e[Math.floor(Math.random()*e.length)];
  cells[r][c]={id:nextId++,val:Math.random()<0.85?2:4};
  return{r,c};
}
function saveUndo(){ prevCells=cells.map(row=>row.map(c=>c?{...c}:null)); prevScore=score; }
function undoMove(){
  if(!prevCells)return;
  cells=prevCells.map(row=>row.map(c=>c?{...c}:null));
  score=prevScore;prevCells=null;
  renderFull();document.getElementById('score').textContent=score;
}

function move(dir){
  saveUndo();
  const moves=[],mergeAt={};let moved=false;
  getLines(dir).forEach(line=>{
    const slots=line.map(({r,c})=>cells[r][c]?{...cells[r][c],r,c}:null);
    const filled=slots.filter(Boolean),result=[],merged=new Set();
    for(let i=0;i<filled.length;i++){
      if(!merged.has(i)&&i+1<filled.length&&filled[i].val===filled[i+1].val&&!merged.has(i+1)){
        const nv=filled[i].val*2;score+=nv;if(nv>best)best=nv;
        staminaMerge(nv);   // 合併回補靈力
        result.push({...filled[i],val:nv,mergedFrom:filled[i+1]});
        merged.add(i); merged.add(i+1);  // 兩顆都標記，避免重複合併
      } else if(!merged.has(i)){
        result.push({...filled[i]});
      }
    }
    result.forEach((tile,idx)=>{
      const{r:toR,c:toC}=line[idx];
      // 只要格子最終位置跟起點不同，或是有合併發生，都算 moved
      if(tile.r!==toR||tile.c!==toC) moved=true;
      moves.push({
        id:tile.id, fromR:tile.r, fromC:tile.c, toR, toC,
        val:tile.val, merged:!!tile.mergedFrom
      });
      if(tile.mergedFrom){
        const mf=tile.mergedFrom;
        // 被吃的那顆：滑到同一目標格後消失
        if(mf.r!==toR||mf.c!==toC) moved=true;
        else moved=true;  // 即使原地合併也算 moved
        moves.push({
          id:mf.id, fromR:mf.r, fromC:mf.c, toR, toC,
          val:mf.val, merged:false, vanish:true
        });
        mergeAt[`${toR},${toC}`]=tile.val;
      }
    });
    line.forEach(({r,c})=>cells[r][c]=null);
    result.forEach((tile,idx)=>{
      const{r,c}=line[idx];
      cells[r][c]={id:tile.id,val:tile.val};
    });
  });
  if(!moved){prevCells=null;return;}

  // 第一次有效滑動時啟動計時器
  startTimer();

  // 播放滑動音
  playSlide();

  animateSlide(moves,mergeAt,()=>{
    const nc=addRandom();
    if(nc)requestAnimationFrame(()=>{
      const layout=getLayout(),cell=cells[nc.r][nc.c];
      if(cell){const el=makeTileEl(cell.id,cell.val,nc.r,nc.c,layout,true);document.getElementById('tileWrap').appendChild(el);tileEls[cell.id]=el;}
    });

    // 動畫式分數更新
    const scoreEl = document.getElementById('score');
    const bestEl  = document.getElementById('best');
    animateScore(scoreEl, displayedScore, score);
    displayedScore = score;
    if(best > displayedBest){
      animateScore(bestEl, displayedBest, best);
      displayedBest = best;
    }

    // 里程碑偵測
    let curMax = 0;
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++)
      if(cells[r][c] && cells[r][c].val > curMax) curMax = cells[r][c].val;
    checkMilestone(curMax);

    checkEnd();
  });
}

function getLines(dir){
  const l=[];
  if(dir==='left') for(let r=0;r<SIZE;r++)l.push(Array.from({length:SIZE},(_,c)=>({r,c})));
  if(dir==='right')for(let r=0;r<SIZE;r++)l.push(Array.from({length:SIZE},(_,c)=>({r,c:SIZE-1-c})));
  if(dir==='up')   for(let c=0;c<SIZE;c++)l.push(Array.from({length:SIZE},(_,r)=>({r,c})));
  if(dir==='down') for(let c=0;c<SIZE;c++)l.push(Array.from({length:SIZE},(_,r)=>({r:SIZE-1-r,c})));
  return l;
}
function checkEnd(){
  if(!won&&cells.some(row=>row.some(c=>c?.val===2048))){
    won=true; stopTimer();
    showOverlay('金','恭喜過關！','太武山・金門永固'); return;
  }
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    if(!cells[r][c])return;
    if(c+1<SIZE&&cellVal(r,c)===cellVal(r,c+1))return;
    if(r+1<SIZE&&cellVal(r,c)===cellVal(r+1,c))return;
  }
  stopTimer();
  showOverlay('敗','遊戲結束','無路可走・請再試一次');
}
function showOverlay(k,t,s){
  document.getElementById('overlayKanji').textContent=k;
  document.getElementById('overlayTitle').textContent=t;
  document.getElementById('overlaySub').textContent=s;
  document.getElementById('overlay').classList.add('active');
}

function getLayout(){
  const board=document.getElementById('board');
  const wrap =document.getElementById('tileWrap');
  const bRect=board.getBoundingClientRect();
  const wRect=wrap.getBoundingClientRect();
  const gap=7, boardPad=10;
  const cellSize=(board.offsetWidth - boardPad*2 - gap*(SIZE-1))/SIZE;
  // #board 相對於 tileWrap 的精確偏移
  const offsetX=bRect.left - wRect.left + boardPad;
  const offsetY=bRect.top  - wRect.top  + boardPad;
  return{gap, cellSize, offsetX, offsetY};
}
function cellPos(r,c,l){
  return{
    left: l.offsetX + c*(l.cellSize+l.gap),
    top:  l.offsetY + r*(l.cellSize+l.gap),
  };
}

function makeTileEl(id,val,r,c,layout,isNew=false){
  const info=tileMap[val]||{cls:'t2048',emoji:'\u26E9',name:String(val)};
  const el=document.createElement('div');
  const{left,top}=cellPos(r,c,layout);
  const{cellSize}=layout;
  const fs=cellSize<80?cellSize*0.28:cellSize*0.26;
  const ns=cellSize<80?cellSize*0.115:cellSize*0.11;
  el.className=`tile ${info.cls}`;
  el.style.cssText=`left:${left}px;top:${top}px;width:${cellSize}px;height:${cellSize}px;transition:none;`;
  el.innerHTML=`<div class="tile-emoji" style="font-size:${fs}px">${info.emoji}</div><div class="tile-name" style="font-size:${ns}px">${info.name}</div>`;
  if(isNew)el.style.animation='pop-in 0.22s ease-out';
  el.dataset.id=id;
  return el;
}

function animateSlide(moves,mergeAt,onDone){
  const wrap=document.getElementById('tileWrap'),layout=getLayout();

  moves.forEach(m=>{
    let el=tileEls[m.id];
    if(!el){
      el=makeTileEl(m.id,m.val,m.fromR,m.fromC,layout);
      wrap.appendChild(el); tileEls[m.id]=el;
    } else {
      // 先把它放回起點（no transition）
      const{left,top}=cellPos(m.fromR,m.fromC,layout);
      el.style.transition='none';
      el.style.left=left+'px'; el.style.top=top+'px';
      // 如果是合併勝利者，更新外觀為新 val
      if(m.merged){
        const info=tileMap[m.val]||{cls:'t2048',emoji:'\u26E9',name:String(m.val)};
        el.className=`tile ${info.cls}`;
        const{cellSize}=layout;
        const fs=cellSize<80?cellSize*0.28:cellSize*0.26;
        const ns=cellSize<80?cellSize*0.115:cellSize*0.11;
        el.innerHTML=`<div class="tile-emoji" style="font-size:${fs}px">${info.emoji}</div><div class="tile-name" style="font-size:${ns}px">${info.name}</div>`;
      }
    }
    el.style.zIndex=m.vanish?'1':'2';
  });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const ease='cubic-bezier(0.22,0.88,0.4,1.0)';
    moves.forEach(m=>{
      const el=tileEls[m.id];if(!el)return;
      const{left,top}=cellPos(m.toR,m.toC,layout);
      el.style.transition=`left ${SLIDE_MS}ms ${ease},top ${SLIDE_MS}ms ${ease}`;
      el.style.left=left+'px';el.style.top=top+'px';
    });
    setTimeout(()=>{
      moves.filter(m=>m.vanish).forEach(m=>{tileEls[m.id]?.remove();delete tileEls[m.id];});
      const mergeIdMap={};
      moves.forEach(m=>{if(m.merged)mergeIdMap[`${m.toR},${m.toC}`]=m.id;});
      Object.entries(mergeAt).forEach(([key,val])=>{
        const[r,c]=key.split(',').map(Number),pos=cellPos(r,c,layout);
        const cx=pos.left+layout.cellSize/2,cy=pos.top+layout.cellSize/2;
        const color=particleColor(val),cnt=val>=1024?18:val>=256?13:8;
        spawnInkBurst(cx,cy,color);spawnRing(cx,cy,color);
        spawnFoil(cx,cy,color,cnt);spawnRunes(cx,cy,val>=512?5:val>=128?3:2);
        spawnScorePopup(cx,cy,val);triggerFlash(val,color);
        playMerge(val);
        const mel=tileEls[mergeIdMap[key]];
        if(mel){
          // 暫停 idle 動畫，播放 merge-pop，再恢復
          mel.style.animationPlayState='paused';
          mel.style.animation='merge-pop 0.32s cubic-bezier(.36,.07,.19,.97)';
          mel.addEventListener('animationend',()=>{
            // 恢復原本的 class-driven animation
            mel.style.animation='';
          },{once:true});
        }
      });
      onDone();
    },SLIDE_MS+10);
  }));
}

function renderFull(){
  const wrap=document.getElementById('tileWrap');
  wrap.querySelectorAll('.tile').forEach(t=>t.remove());tileEls={};
  const board=document.getElementById('board');board.innerHTML='';
  for(let i=0;i<SIZE*SIZE;i++)board.innerHTML+='<div class="cell-bg"></div>';
  requestAnimationFrame(()=>{
    const layout=getLayout();
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
      const cell=cells[r][c];if(!cell)continue;
      const el=makeTileEl(cell.id,cell.val,r,c,layout,false);wrap.appendChild(el);tileEls[cell.id]=el;
    }
  });
}

function spawnInkBurst(cx,cy,color){
  const wrap=document.getElementById('tileWrap'),el=document.createElement('div');
  el.className='ink-burst';
  el.style.cssText=`left:${cx}px;top:${cy}px;background:radial-gradient(ellipse,${color}35 0%,${color}08 50%,transparent 70%);`;
  wrap.appendChild(el);el.addEventListener('animationend',()=>el.remove());
}
function spawnRing(cx,cy,color){
  const wrap=document.getElementById('tileWrap'),ring=document.createElement('div');
  ring.className='merge-ring';
  ring.style.cssText=`left:${cx}px;top:${cy}px;border:2px solid ${color};box-shadow:0 0 10px ${color}90;`;
  wrap.appendChild(ring);ring.addEventListener('animationend',()=>ring.remove());
}
function spawnFoil(cx,cy,color,count){
  const wrap=document.getElementById('tileWrap');
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='foil-particle';
    const angle=(i/count)*Math.PI*2+Math.random()*0.6,dist=26+Math.random()*40,rot=(Math.random()-0.5)*600;
    const w=Math.random()*5+2,h=Math.random()*3+1;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${w}px;height:${h}px;background:${color};box-shadow:0 0 5px ${color}90;--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--rot:${rot}deg;`;
    p.style.animationDelay=Math.random()*0.09+'s';
    wrap.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
}
function spawnRunes(cx,cy,count){
  const wrap=document.getElementById('tileWrap');
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='rune-particle';
    const angle=Math.random()*Math.PI*2,dist=32+Math.random()*32,rot=(Math.random()-0.5)*360,size=12+Math.random()*9;
    p.textContent=RUNES[Math.floor(Math.random()*RUNES.length)];
    p.style.cssText=`left:${cx}px;top:${cy}px;font-size:${size}px;color:#f0c868;text-shadow:0 0 10px rgba(212,160,67,0.95);--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--rot:${rot}deg;`;
    p.style.animationDelay=Math.random()*0.1+'s';
    wrap.appendChild(p);p.addEventListener('animationend',()=>p.remove());
  }
}
function spawnScorePopup(cx,cy,val){
  const wrap=document.getElementById('tileWrap'),el=document.createElement('div');
  el.className='score-popup';el.textContent=`+${val}`;
  el.style.cssText=`left:${cx}px;top:${cy}px;`;
  if(val>=1024){el.style.fontSize='26px';el.style.color=particleColor(val);}
  wrap.appendChild(el);el.addEventListener('animationend',()=>el.remove());
}
function triggerFlash(val,color){
  if(val<64)return;
  const flash=document.getElementById('flash');
  flash.style.background=`radial-gradient(ellipse at center,${color}25 0%,transparent 65%)`;
  flash.classList.remove('flash-anim');void flash.offsetWidth;flash.classList.add('flash-anim');
  flash.addEventListener('animationend',()=>flash.classList.remove('flash-anim'),{once:true});
}

// 首次互動解鎖 AudioContext（iOS/Chrome 政策）
document.addEventListener('touchstart', () => getAudioCtx(), {once:true, passive:true});
document.addEventListener('keydown', () => getAudioCtx(), {once:true});

document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]){e.preventDefault();if(!isAnimating&&!isPaused){isAnimating=true;move(map[e.key]);setTimeout(()=>isAnimating=false,SLIDE_MS+30);}}
});

// 手機滑動：鎖定在棋盤容器，攔截瀏覽器滾動
let tx0,ty0;
const gameEl = document.querySelector('.game-container');
gameEl.addEventListener('touchstart', e=>{
  tx0=e.touches[0].clientX; ty0=e.touches[0].clientY;
  getAudioCtx();
}, {passive:false});
gameEl.addEventListener('touchmove', e=>{
  e.preventDefault(); // 阻止頁面跟著滾動
}, {passive:false});
gameEl.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
  if(!isAnimating && !isPaused){
    isAnimating=true;
    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
    setTimeout(()=>isAnimating=false, SLIDE_MS+30);
  }
}, {passive:false});

// ─── 暫停系統 ───
let isPaused = false;

function togglePause() {
  // 遊戲結束時不能暫停
  if(document.getElementById('overlay').classList.contains('active')) return;

  isPaused = !isPaused;
  const btn = document.getElementById('btnPause');
  const po  = document.getElementById('pauseOverlay');

  if(isPaused) {
    stopTimer();
    po.classList.add('active');
    btn.textContent = '繼　　續';
    btn.dataset.paused = 'true';
  } else {
    po.classList.remove('active');
    btn.textContent = '暫　　停';
    btn.dataset.paused = 'false';
    // 只有計時器曾經啟動過才恢復
    if(timerRunning === false && timeLeft < TIMER_INIT) startTimer();
    else if(timeLeft > 0) startTimer();
  }
}

window.addEventListener('resize',()=>renderFull());

// 初始化計時條顯示
updateTimerUI();

document.getElementById('bgLayer').style.backgroundImage = "url('assets/image/BG.webp')";

newGame();
</script>
